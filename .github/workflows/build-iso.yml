name: Build Linux ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y live-build rsync

      - name: Build ISO
        run: |
          mkdir -p config/hooks/normal
          # 假设你的钩子脚本在 build-scripts/chroot-setup.sh
          cp build-scripts/chroot-setup.sh config/hooks/normal/
          
          # 准备目录并执行构建
          mkdir -p config/includes.chroot/opt/windows-app-os
          rsync -av --exclude='.git' --exclude='.github' ./ config/includes.chroot/opt/windows-app-os/
          
          cd config
          sudo lb config
          sudo lb build
          
          # 重命名产物
          mv live-image-amd64.hybrid.iso ../windows-app-os.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-os-iso
          path: windows-app-os.iso
