      - name: Build ISO
        run: |
          # 先列出当前目录文件，方便调试查看路径
          ls -R
          
          # 确保回到根目录
          cd $GITHUB_WORKSPACE
          
          # 使用绝对路径或者确认目录结构
          mkdir -p config/hooks/normal
          
          # 尝试直接复制，如果还报错，说明文件夹名真的不叫 build-scripts
          cp build-scripts/chroot-setup.sh config/hooks/normal/
          
          # (后续步骤保持不变...)
          mkdir -p config/includes.chroot/opt/windows-app-os
          rsync -av --exclude='.git' --exclude='.github' ./ config/includes.chroot/opt/windows-app-os/
          cd config
          sudo lb config
          sudo lb build
          mv live-image-amd64.hybrid.iso ../windows-app-os.iso
