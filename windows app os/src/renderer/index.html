<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Windows App OS</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/taskbar.css">
  <link rel="stylesheet" href="css/start-menu.css">
  <link rel="stylesheet" href="css/windows.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Desktop Area                                                    -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="desktop">
    <div id="desktop-icons"></div>
    <!-- App windows are dynamically appended here by WindowManager -->
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Taskbar                                                         -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="taskbar">

    <!-- Start button -->
    <button id="taskbar-start" title="Start">&#x25A2;</button>

    <!-- Centered app buttons (populated dynamically) -->
    <div id="taskbar-apps"></div>

    <!-- System tray (right side) -->
    <div id="taskbar-tray">
      <button class="tray-item" id="tray-network-icon" title="Network">&#x1F310;</button>
      <button class="tray-item" id="tray-clock-container" title="Quick settings">
        <span id="tray-clock">00:00</span>
        <span id="tray-date" style="margin-left:6px;">00/00/0000</span>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Start Menu                                                      -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="start-menu">
    <div class="start-search">
      <input type="text" id="start-search-input" placeholder="Type to search...">
    </div>
    <div class="start-section-title">Pinned</div>
    <div class="start-pinned" id="start-pinned-apps">
      <!-- Populated by StartMenu.renderPinned() -->
    </div>
    <div class="start-footer">
      <button class="start-footer-btn power-btn" id="start-power-btn">
        &#x23FB; Power
      </button>
      <div style="position: relative;">
        <div id="power-menu">
          <button class="power-menu-item" id="power-shutdown">
            &#x23FB; Shut down
          </button>
          <button class="power-menu-item" id="power-reboot">
            &#x21BB; Restart
          </button>
          <button class="power-menu-item" id="power-sleep">
            &#x1F4A4; Sleep
          </button>
          <button class="power-menu-item danger" id="power-logout">
            &#x2190; Sign out
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Quick Settings Flyout                                           -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="quick-settings">
    <div class="qs-row">
      <span class="qs-label">Network</span>
      <span class="qs-value qs-network-status">--</span>
    </div>
    <div class="qs-row">
      <span class="qs-label">Memory</span>
      <span class="qs-value qs-memory-status">--</span>
    </div>
    <div class="qs-row">
      <span class="qs-label">Display</span>
      <span class="qs-value" id="qs-display-info">Openbox / Xorg</span>
    </div>
    <div style="margin-top: 10px; text-align: right;">
      <button class="btn btn-sm" onclick="StartMenu.openNetworkDialog ? StartMenu.handlePinnedAction('openNetwork') : null;">Network Settings</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Toast Notification Container                                    -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- JavaScript Modules (load order matters)                         -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/window-manager.js"></script>
  <script src="js/taskbar.js"></script>
  <script src="js/start-menu.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
